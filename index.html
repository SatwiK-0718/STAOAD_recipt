<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>STAOAD Receipt Generator</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  </head>

  <body>
    <div class="card">
      <h2>STAOAD Receipt Generator</h2>
      <p>Upload Excel → Generate PDF</p>
      <input type="file" id="xlInput" accept=".csv, .xlsx" />
      <button id="dlBtn" disabled>Download PDF</button>
    </div>

    <div id="render-zone" style="display: none"></div>

    <!-- External JS -->
    <script src="script.js"></script>
  </body>
</html>
